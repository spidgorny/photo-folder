service: upload-handler
frameworkVersion: '4'
useDotenv: true

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-central-1
  profile: default

package:
  individually: false

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node22
    platform: node
    external:
      - '@aws-sdk/client-s3'
      - '@aws-sdk/lib-storage'
      - '@aws-sdk/s3-request-presigner'
      - sharp

functions:
  uploadHandlerApi:
    handler: src/index.handlerApi
    memorySize: 1024
    timeout: 30
    layers:
      - arn:aws:lambda:eu-central-1:508606145348:layer:sharp-lambda-x64:1
    package:
      include:
        - src/**
        - lib/**
    environment:
      BUCKET_ACCESS_KEY_ID: ${env:BUCKET_ACCESS_KEY_ID}
      BUCKET_SECRET_ACCESS_KEY: ${env:BUCKET_SECRET_ACCESS_KEY}
      BUCKET_NAME: ${env:BUCKET_NAME}
      THUMBNAIL_SIZE: ${env:THUMBNAIL_SIZE}
    events:
      - httpApi:
          method: POST
          path: /handle-upload
  uploadHandler:
    handler: src/index.handler
    memorySize: 1024
    timeout: 30
    layers:
      - arn:aws:lambda:eu-central-1:508606145348:layer:sharp-lambda-x64:1
    environment:
      BUCKET_ACCESS_KEY_ID: ${env:BUCKET_ACCESS_KEY_ID}
      BUCKET_SECRET_ACCESS_KEY: ${env:BUCKET_SECRET_ACCESS_KEY}
      BUCKET_NAME: ${env:BUCKET_NAME}
      THUMBNAIL_SIZE: ${env:THUMBNAIL_SIZE}
    events:
      - s3:
          event: s3:ObjectCreated:*
          bucket: slawa-photo
          rules:
            #            - prefix: '*/'
            - suffix: .jpg
          existing: true
          forceDeploy: true
      - s3:
          event: s3:ObjectCreated:*
          bucket: slawa-photo
          rules:
            #            - prefix: '*/'
            - suffix: .png
          existing: true
          forceDeploy: true
