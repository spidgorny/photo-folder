service: upload-handler
frameworkVersion: '4'
useDotenv: true

provider:
  name: aws
  runtime: nodejs22.x
  region: eu-central-1
  profile: default

functions:
  uploadHandlerApi:
    handler: index.handlerApi
    environment:
      BUCKET_ACCESS_KEY_ID: ${env:BUCKET_ACCESS_KEY_ID}
      BUCKET_SECRET_ACCESS_KEY: ${env:BUCKET_SECRET_ACCESS_KEY}
      BUCKET_NAME: ${env:BUCKET_NAME}
    events:
      - httpApi:
          method: POST
          path: /handle-upload
  uploadHandler:
    handler: index.handler
    environment:
      BUCKET_ACCESS_KEY_ID: ${env:BUCKET_ACCESS_KEY_ID}
      BUCKET_SECRET_ACCESS_KEY: ${env:BUCKET_SECRET_ACCESS_KEY}
      BUCKET_NAME: ${env:BUCKET_NAME}
    events:
      - s3:
          event: s3:ObjectCreated:*
          bucket: slawa-photo
          rules:
            #            - prefix: '*/'
            - suffix: .jpg
          existing: true
          forceDeploy: true
      - s3:
          event: s3:ObjectCreated:*
          bucket: slawa-photo
          rules:
            #            - prefix: '*/'
            - suffix: .png
          existing: true
          forceDeploy: true
